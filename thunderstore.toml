# This file is used by the Thunderstore CLI to build and publish your mod to Thunderstore. https://github.com/thunderstore-io/thunderstore-cli

[config]
schemaVersion = "0.0.1"

[package]
namespace = "art0007i"
name = "ConsistentDashboard"
description = "Makes it so the dashboard is always the same resolution in VR and in desktop mode"
websiteUrl = "https://github.com/art0007i/ConsistentDashboard"
containsNsfwContent = false

[package.dependencies] 
ResoniteModding-BepisLoader = "1.5.1"

[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "./Plugin/bin/Release/ConsistentDashboard.dll"
target = "plugins/ConsistentDashboard/"

[[build.copy]]
source = "./Plugin/bin/Release/ConsistentDashboard.pdb"
target = "plugins/ConsistentDashboard/"

[[build.copy]]
source = "./CHANGELOG.md"
target = "/"

[[build.copy]]
source = "./LICENSE"
target = "/"

[publish]
repository = "https://thunderstore.io"
communities = ["resonite"]

[publish.categories]
resonite = [ "mods", "dashboard" ] # TODO: Change this to your mod's categories, see https://thunderstore.io/api/experimental/community/resonite/category/ for a list of available categories
